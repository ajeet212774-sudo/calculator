<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .navbar {
            background-color: #333;
            padding: 10px;
            color: #fff;
            text-align: center;
            font-weight: bold;
        }
        .container {
            margin: 30px auto;
            max-width: 500px;
            background: #fff;
            padding: 20px 25px;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }
        h1, h2 {
            text-align: center;
        }
        form {
            margin-top: 15px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input[type="number"], select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        button {
            margin-top: 15px;
            padding: 8px 15px;
            font-size: 15px;
            cursor: pointer;
        }
        .result {
            margin-top: 15px;
            padding: 10px;
            background: #e6ffe6;
            border: 1px solid #99cc99;
            border-radius: 4px;
        }
        .error {
            margin-top: 15px;
            padding: 10px;
            background: #ffe6e6;
            border: 1px solid #cc9999;
            border-radius: 4px;
            color: #b30000;
        }
    </style>
</head>
<body>
    <div class="navbar">
        Flask Calculator
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
